<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族見守りDX</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:0;
background:
linear-gradient(
180deg,
#edf5fb 0%,
#f8fbff 100%
);
font-family:
-apple-system,
BlinkMacSystemFont,
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#222;
}

.wrap{
max-width:760px;
margin:0 auto;
padding:
28px 18px 140px;
}



/* 上タイトル */

.main-title{
font-size:54px;
font-weight:900;
line-height:1.35;
margin-bottom:28px;
color:#202020;
}



/* カード */

.card{
background:#ffffff;
border-radius:38px;
padding:34px 28px;
margin-bottom:28px;

box-shadow:
0 12px 36px rgba(0,0,0,.08);
}



/* 名前 */

.name{
font-size:62px;
font-weight:900;
line-height:1.3;
margin-bottom:26px;
}



/* 状態 */

.status{
font-size:58px;
font-weight:900;
line-height:1.3;
margin-bottom:34px;
color:#24b04a;
}



/* 最終確認 */

.time-label{
font-size:28px;
font-weight:900;
color:#777;
margin-bottom:10px;
}

.time{
font-size:42px;
font-weight:900;
line-height:1.6;
color:#555;
}



/* 薬カード */

.medicine-card{
background:
linear-gradient(
180deg,
#f8fafc 0%,
#f1f5f9 100%
);

border-radius:30px;

padding:28px;

margin-top:22px;
}

.medicine-title{
font-size:52px;
font-weight:900;
margin-bottom:30px;
line-height:1.4;
}

.medicine-time{
font-size:50px;
font-weight:900;
color:#222;
line-height:1.5;
}



/* bottom */

.bottom-menu{
position:fixed;
left:0;
right:0;
bottom:0;

background:#fff;

display:flex;
justify-content:space-around;

padding:16px 0;

box-shadow:
0 -4px 16px rgba(0,0,0,.10);

z-index:999;
}

.bottom-btn{
text-decoration:none;
color:#222;
font-size:18px;
font-weight:900;
text-align:center;
}

.bottom-icon{
display:block;
font-size:34px;
margin-bottom:4px;
}



/* エラー */

.error{
color:#ef5350;
}



/* ローディング */

.loading{
font-size:34px;
font-weight:900;
color:#888;
}

</style>
</head>

<body>

<div class="wrap">

<div class="main-title">
🏠 家族見守りDX
</div>



<div class="card">

<div class="name">
👴 山口さん
</div>

<div
id="statusBox"
class="status"
>
読み込み中...
</div>



<div class="time-label">
最終確認
</div>

<div
id="timeBox"
class="time"
>
---
</div>



<div
id="medicineBox"
class="medicine-card"
>

<div class="loading">
読み込み中...
</div>

</div>

</div>

</div>



<div class="bottom-menu">

<a
class="bottom-btn"
href="./"
>

<span class="bottom-icon">
🏠
</span>

ホーム

</a>



<a
class="bottom-btn"
href="./family.html"
>

<span class="bottom-icon">
👪
</span>

家族

</a>

</div>



<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbyFUX6w7KMKZ87PR37MrFaPgW1clmiTR5LigJO43XLVQCZ7IdsGLP6HXPeNMzd9qN1L/exec?code=YAMA1234';



async function loadData(){

try{

const response =
await fetch(
GAS_URL + '&t=' + Date.now()
);

const data =
await response.json();

const rows =
data.rows || [];



if(rows.length === 0){

document.getElementById(
'statusBox'
).innerHTML =
'まだ記録なし';

return;

}



const latest =
rows[rows.length - 1];



document.getElementById(
'statusBox'
).innerHTML =

'😊 ' +
(latest.status || '');



document.getElementById(
'timeBox'
).innerHTML =

(latest.update || '');



let html = '';



if(latest.medicine){

html +=

'<div class="medicine-title">💊 '

+

latest.medicine

+

'</div>'

+

'<div class="medicine-time">🕒 '

+

(latest.medicineTime || '')

+

'</div>';

}

else{

html =
'<div class="loading">薬記録なし</div>';

}



document.getElementById(
'medicineBox'
).innerHTML =
html;

}

catch(err){

console.log(err);

document.getElementById(
'statusBox'
).innerHTML =
'通信エラー';

document.getElementById(
'statusBox'
).classList.add(
'error'
);

}

}



loadData();

setInterval(
loadData,
10000
);

</script>

</body>
</html>
