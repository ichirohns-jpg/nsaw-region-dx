<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族見守りDX</title>

<style>
*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:0;
background:#f1f4f7;
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
color:#222;
}

.wrap{
max-width:720px;
margin:0 auto;
padding:22px 16px 120px;
}

.header{
font-size:38px;
font-weight:900;
margin-bottom:18px;
line-height:1.35;
}

.card{
background:#fff;
border-radius:28px;
padding:26px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
margin-bottom:20px;
}

.name{
font-size:42px;
font-weight:900;
margin-bottom:16px;
}

.status{
font-size:42px;
font-weight:900;
color:#1f9d4a;
margin-bottom:16px;
}

.label{
font-size:20px;
font-weight:900;
color:#777;
margin-bottom:8px;
}

.time{
font-size:30px;
font-weight:900;
color:#333;
line-height:1.5;
}

.medicine{
background:#f7f9fb;
border-radius:22px;
padding:22px;
margin-top:22px;
}

.med-title{
font-size:32px;
font-weight:900;
margin-bottom:12px;
}

.med-time{
font-size:30px;
font-weight:900;
}

.bottom-menu{
position:fixed;
left:0;
right:0;
bottom:0;
background:#fff;
display:flex;
justify-content:space-around;
padding:14px 0;
box-shadow:0 -4px 14px rgba(0,0,0,.10);
z-index:999;
}

.bottom-btn{
text-decoration:none;
color:#222;
font-size:18px;
font-weight:900;
text-align:center;
}

.bottom-icon{
display:block;
font-size:30px;
margin-bottom:4px;
}

.error{
color:#ef5350;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
👪 家族見守りDX
</div>

<div class="card">

<div class="name">
👴 山口さん
</div>

<div id="statusBox" class="status">
読み込み中...
</div>

<div class="label">
最終確認
</div>

<div id="timeBox" class="time">
---
</div>

<div id="medicineBox" class="medicine">
読み込み中...
</div>

</div>

</div>

<div class="bottom-menu">
<a class="bottom-btn" href="./">
<span class="bottom-icon">🏠</span>
ホーム
</a>

<a class="bottom-btn" href="./family.html">
<span class="bottom-icon">👪</span>
家族
</a>
</div>

<script>
const GAS_URL =
'https://script.google.com/macros/s/AKfycbyFUX6w7KMKZ87PR37MrFaPgW1clmiTR5LigJO43XLVQCZ7IdsGLP6HXPeNMzd9qN1L/exec?code=YAMA1234';

async function loadData(){

try{

const response =
await fetch(GAS_URL + '&t=' + Date.now());

const data =
await response.json();

const rows =
data.rows || [];

if(rows.length === 0){

document.getElementById('statusBox').innerHTML =
'まだ記録なし';

document.getElementById('timeBox').innerHTML =
'データ未登録';

document.getElementById('medicineBox').innerHTML =
'<div class="med-title">💊 薬記録なし</div>';

return;

}

const latest =
rows[rows.length - 1];

document.getElementById('statusBox').innerHTML =
'😊 ' + (latest.status || '');

document.getElementById('timeBox').innerHTML =
latest.update || '';

if(latest.medicine){

document.getElementById('medicineBox').innerHTML =
'<div class="med-title">💊 ' + latest.medicine + '</div>' +
'<div class="med-time">🕒 ' + (latest.medicineTime || '') + '</div>';

}else{

document.getElementById('medicineBox').innerHTML =
'<div class="med-title">💊 薬記録なし</div>';

}

}catch(err){

document.getElementById('statusBox').innerHTML =
'通信エラー';

document.getElementById('statusBox').classList.add('error');

}

}

loadData();
setInterval(loadData,10000);
</script>

</body>
</html>
