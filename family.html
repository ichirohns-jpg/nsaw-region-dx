<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族見守りDX</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:16px;
background:#eef3f8;
font-family:
-apple-system,
BlinkMacSystemFont,
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#222;
}

.wrap{
max-width:760px;
margin:0 auto;
padding-bottom:100px;
}

.box{
background:#fff;
border-radius:28px;
padding:24px;
margin-bottom:24px;
box-shadow:
0 8px 24px rgba(0,0,0,.08);
}

.title{
font-size:44px;
font-weight:900;
margin-bottom:24px;
}

.name{
font-size:56px;
font-weight:900;
margin-bottom:24px;
}

.status{
font-size:48px;
font-weight:900;
margin-bottom:24px;
color:#22aa44;
}

.time{
font-size:28px;
font-weight:900;
margin-bottom:28px;
color:#666;
line-height:1.6;
}

.item{
background:#f5f7fa;
border-radius:20px;
padding:22px;
margin-bottom:18px;
font-size:28px;
font-weight:900;
line-height:1.6;
}

.bottom-menu{
position:fixed;
left:0;
right:0;
bottom:0;
background:#fff;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:
0 -4px 14px rgba(0,0,0,.10);
z-index:999;
}

.bottom-btn{
text-decoration:none;
color:#222;
font-size:18px;
font-weight:900;
text-align:center;
}

.bottom-icon{
display:block;
font-size:28px;
margin-bottom:4px;
}

.error{
color:#ef5350;
}

</style>
</head>

<body>

<div class="wrap">

<div class="box">

<div class="title">
👪 家族見守りDX
</div>

<div class="name">
👴 山口さん
</div>

<div
id="statusBox"
class="status"
>
読み込み中...
</div>

<div
id="timeBox"
class="time"
>
---
</div>

<div
id="medicineBox"
>
<div class="item">
💊 読み込み中...
</div>
</div>

</div>

</div>



<div class="bottom-menu">

<a
class="bottom-btn"
href="./"
>

<span class="bottom-icon">
🏠
</span>

ホーム

</a>



<a
class="bottom-btn"
href="./family.html"
>

<span class="bottom-icon">
👪
</span>

家族

</a>

</div>



<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbyHPHU3XBp8Zch_sriN-J_Pc3J6tFx0_YZZb7b9YXafIFAJabRvMdKtSfi6vVaqkCCK/exec?code=YAMA1234';



async function loadData(){

try{

const response =
await fetch(
GAS_URL + '&t=' + Date.now()
);

const data =
await response.json();

const rows =
data.rows || [];



if(rows.length === 0){

document.getElementById(
'statusBox'
).innerHTML =
'まだ記録なし';

document.getElementById(
'timeBox'
).innerHTML =
'データ未登録';

document.getElementById(
'medicineBox'
).innerHTML =

'<div class="item">💊 薬記録なし</div>';

return;

}



const latest =
rows[rows.length - 1];



document.getElementById(
'statusBox'
).innerHTML =

'😊 ' +
(latest.status || '');



document.getElementById(
'timeBox'
).innerHTML =

'最終確認： ' +

(latest.update || '');



let html = '';



if(latest.medicine){

html +=

'<div class="item">'

+

'💊 '

+

latest.medicine

+

'<br>'

+

'🕒 '

+

(latest.medicineTime || '')

+

'</div>';

}

else{

html =
'<div class="item">💊 薬記録なし</div>';

}



document.getElementById(
'medicineBox'
).innerHTML =
html;

}

catch(err){

console.log(err);

document.getElementById(
'statusBox'
).innerHTML =
'通信エラー';

document.getElementById(
'statusBox'
).classList.add(
'error'
);

}

}



loadData();

setInterval(
loadData,
10000
);

</script>

</body>
</html>
