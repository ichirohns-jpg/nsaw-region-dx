<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族見守りDX</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:16px;
background:#eef3f8;
font-family:
-apple-system,
BlinkMacSystemFont,
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#222;
}

.wrap{
max-width:760px;
margin:0 auto;
}

.box{
background:#fff;
border-radius:28px;
padding:24px;
margin-bottom:24px;
box-shadow:
0 8px 24px rgba(0,0,0,.08);
}

.title{
font-size:54px;
font-weight:900;
margin-bottom:24px;
}

.name{
font-size:64px;
font-weight:900;
margin-bottom:24px;
}

.status{
font-size:56px;
font-weight:900;
margin-bottom:24px;
color:#22aa44;
}

.item{
font-size:30px;
line-height:1.8;
font-weight:900;
margin-bottom:18px;
}

hr{
margin:28px 0;
}

.blue{
color:#1d4ed8;
}

.red{
color:#ef5350;
}

.gray{
color:#666;
}

a{
color:#1d4ed8;
text-decoration:none;
font-weight:900;
}

</style>
</head>

<body>

<div class="wrap">

<div class="box">

<div class="title">
👪 家族見守りDX
</div>

<div class="name">
👴 山口さん
</div>

<div
id="statusBox"
class="status"
>
読み込み中...
</div>

<div
id="timeBox"
class="item gray"
>
---
</div>

<hr>

<div
id="medicineBox"
class="item"
>
💊 読み込み中...
</div>

<div
id="alertBox"
class="item red"
>
🆘 読み込み中...
</div>

<div
id="locationBox"
class="item blue"
>
📍 読み込み中...
</div>

</div>

</div>

<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbwcb8ig7N1XMZkwYm-BOSDC3N1w5ifNvGr6qqE3-ER0gn4pkn3zgLZ7sWIrcrzgH6yE/exec?code=YAMA1234';



async function loadData(){

try{

const response =
await fetch(
GAS_URL + '&t=' + Date.now()
);

const data =
await response.json();

console.log(data);



if(
!data ||
!data.rows
){

document.getElementById(
'statusBox'
).innerHTML =
'データ取得失敗';

return;

}



const rows =
data.rows;



if(rows.length === 0){

document.getElementById(
'statusBox'
).innerHTML =
'データなし';

document.getElementById(
'timeBox'
).innerHTML =
'まだ記録されていません';

document.getElementById(
'medicineBox'
).innerHTML =
'💊 薬記録なし';

document.getElementById(
'alertBox'
).innerHTML =
'🆘 緊急記録なし';

document.getElementById(
'locationBox'
).innerHTML =
'📍 位置情報なし';

return;

}



const latest =
rows[rows.length - 1];



document.getElementById(
'statusBox'
).innerHTML =

'😊 ' +
(latest.status || '確認中');



document.getElementById(
'timeBox'
).innerHTML =

'最終確認：' +
(latest.datetime || '');



let medicineHtml =
'💊 薬記録なし';

let alertHtml =
'🆘 緊急記録なし';

let locationHtml =
'📍 位置情報なし';



const medicineRows =
rows.filter(
r => r.type === '薬'
);

if(medicineRows.length > 0){

medicineHtml = '';

medicineRows.reverse().forEach(r => {

medicineHtml +=

'💊 ' +

r.status +

' ： ' +

r.time +

'<br>';

});

}



const alertRows =
rows.filter(
r => r.type === '緊急'
);

if(alertRows.length > 0){

alertHtml = '';

alertRows.reverse().forEach(r => {

alertHtml +=

'🆘 ' +

r.status +

' ： ' +

r.time +

'<br>';

});

}



const locationRows =
rows.filter(
r => r.lat && r.lng
);

if(locationRows.length > 0){

const loc =
locationRows[
locationRows.length - 1
];

locationHtml =

'<a target="_blank" href="https://maps.google.com/?q=' +

loc.lat +

',' +

loc.lng +

'">📍 現在地を見る</a>';

}



document.getElementById(
'medicineBox'
).innerHTML =
medicineHtml;

document.getElementById(
'alertBox'
).innerHTML =
alertHtml;

document.getElementById(
'locationBox'
).innerHTML =
locationHtml;

}

catch(err){

console.log(err);

document.getElementById(
'statusBox'
).innerHTML =
'通信エラー';

}

}



loadData();

setInterval(
loadData,
10000
);

</script>

</body>
</html>
