<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族確認画面</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:18px;
  background:#eef3f8;
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#222;
}

.wrap{
  max-width:700px;
  margin:0 auto;
}

.title{
  font-size:42px;
  font-weight:900;
  margin:
  10px 0
  30px;
}

.card{
  background:#fff;
  border-radius:28px;
  padding:28px;
  margin-bottom:28px;
  box-shadow:
  0 8px 24px
  rgba(0,0,0,.10);
}

.name{
  font-size:36px;
  font-weight:900;
  margin-bottom:20px;
}

.line{
  font-size:28px;
  line-height:1.9;
  margin-bottom:14px;
  word-break:keep-all;
}

.good{
  color:#1b8f3c;
  font-weight:900;
}

.bad{
  color:#d93025;
  font-weight:900;
}

.time{
  color:#666;
  font-size:22px;
}

.map-btn{
  display:block;
  width:100%;
  text-decoration:none;
  text-align:center;
  border-radius:20px;
  padding:22px;
  margin-top:22px;
  background:#2f6df6;
  color:#fff;
  font-size:28px;
  font-weight:900;
}

.refresh-btn{
  width:100%;
  border:none;
  border-radius:22px;
  padding:24px;
  margin-bottom:30px;
  background:#4a90e2;
  color:#fff;
  font-size:30px;
  font-weight:900;
}

.section-title{
  font-size:30px;
  font-weight:900;
  margin:
  26px 0
  18px;
}

hr{
  border:none;
  border-top:
  2px solid #ddd;
  margin:
  22px 0;
}

.empty{
  color:#777;
  font-size:24px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="title">
👨 家族確認画面
</div>

<button
class="refresh-btn"
onclick="loadData()"
>
🔄 更新する
</button>

<div id="familyList"></div>

</div>

<script>



function loadData(){

const todayData =

JSON.parse(
localStorage.getItem(
'todayData'
)
)

||

[];



const todayHtml =

todayData.length

?

todayData.map(item =>

`
<div class="line">
${item.icon}
${item.text}
</div>
`

).join('')

:

`
<div class="empty">
今日の予定はありません
</div>
`;



const familyHtml =

`
<div class="card">

<div class="name">
👴 山口さん
</div>

<div class="line good">
😊 元気です
</div>

<div class="time">
最終確認：今日 08:15
</div>

<hr>

<div class="line">
💊 朝の薬：
<span class="good">
飲みました
</span>
</div>

<div class="section-title">
📅 今日の予定
</div>

${todayHtml}

<a
class="map-btn"
href="https://maps.google.com"
target="_blank"
>
📍 Googleマップを見る
</a>

</div>
`;



document.getElementById(
'familyList'
).innerHTML =

familyHtml;

}



loadData();

</script>

</body>
</html>
