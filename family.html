<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族見守りDX</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:16px;
background:#eef3f8;
font-family:
-apple-system,
BlinkMacSystemFont,
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#222;
}

.wrap{
max-width:760px;
margin:0 auto;
padding-bottom:100px;
}

.box{
background:#fff;
border-radius:28px;
padding:24px;
margin-bottom:24px;
box-shadow:
0 8px 24px rgba(0,0,0,.08);
}

.title{
font-size:44px;
font-weight:900;
margin-bottom:24px;
}

.name{
font-size:54px;
font-weight:900;
margin-bottom:24px;
}

.status{
font-size:42px;
font-weight:900;
margin-bottom:24px;
color:#22aa44;
}

.item{
font-size:28px;
line-height:1.8;
font-weight:900;
margin-bottom:18px;
}

.gray{
color:#666;
}

.bottom-menu{
position:fixed;
left:0;
right:0;
bottom:0;
background:#fff;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:
0 -4px 14px rgba(0,0,0,.10);
}

.bottom-btn{
text-decoration:none;
color:#222;
font-size:18px;
font-weight:900;
text-align:center;
}

.bottom-icon{
display:block;
font-size:28px;
margin-bottom:4px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="box">

<div class="title">
👪 家族見守りDX
</div>

<div class="name">
👴 山口さん
</div>

<div
id="statusBox"
class="status"
>
読み込み中...
</div>

<div
id="timeBox"
class="item gray"
>
---
</div>

<hr>

<div
id="medicineBox"
class="item"
>
💊 読み込み中...
</div>

</div>

</div>



<div class="bottom-menu">

<a
class="bottom-btn"
href="./"
>

<span class="bottom-icon">
🏠
</span>

ホーム

</a>



<a
class="bottom-btn"
href="./family.html"
>

<span class="bottom-icon">
👪
</span>

家族

</a>

</div>



<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbyctWQYDpLEo2K3e6VqYNOJZTznMPDq77fFK70mjuWHG7k-UHwexMvKPKinooTj4pGB/exec?code=YAMA1234';



async function loadData(){

try{

const response =
await fetch(
GAS_URL + '&t=' + Date.now()
);

const data =
await response.json();

const rows =
data.rows || [];



if(rows.length === 0){

document.getElementById(
'statusBox'
).innerHTML =
'まだ記録なし';

return;

}



const latest =
rows[rows.length - 1];



document.getElementById(
'statusBox'
).innerHTML =

'😊 ' +
(latest.status || '');



document.getElementById(
'timeBox'
).innerHTML =

'最終確認：' +
(latest.datetime || '');



const medicineRows =
rows.filter(
r => r.type === '薬'
);



let medicineHtml =
'💊 薬記録なし';



if(medicineRows.length > 0){

medicineHtml = '';

medicineRows.reverse().forEach(r => {

medicineHtml +=

'💊 ' +

r.status +

' ： ' +

r.time +

'<br>';

});

}



document.getElementById(
'medicineBox'
).innerHTML =
medicineHtml;

}

catch(err){

document.getElementById(
'statusBox'
).innerHTML =
'通信エラー';

}

}



loadData();

setInterval(
loadData,
10000
);

</script>

</body>
</html>
