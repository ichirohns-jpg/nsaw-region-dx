<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族見守りDX</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:18px;
background:#eef3f8;
font-family:
-apple-system,
BlinkMacSystemFont,
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#222;
}

.wrap{
max-width:760px;
margin:0 auto;
}

.box{
background:#fff;
border-radius:28px;
padding:24px;
margin-bottom:24px;
box-shadow:
0 8px 24px
rgba(0,0,0,.08);
}

.title{
font-size:48px;
font-weight:900;
margin-bottom:24px;
}

.big{
font-size:56px;
font-weight:900;
margin-bottom:20px;
}

.status{
font-size:48px;
font-weight:900;
margin-bottom:20px;
color:#22aa44;
}

.item{
font-size:30px;
line-height:1.8;
font-weight:900;
margin-bottom:14px;
}

.red{
color:#ef5350;
}

.blue{
color:#1d4ed8;
}

.gray{
color:#666;
}

</style>
</head>

<body>

<div class="wrap">

<div class="box">

<div class="title">
👪 家族見守りDX
</div>

<div class="big">
👴 山口さん
</div>

<div
id="statusBox"
class="status"
>
読み込み中...
</div>

<div
id="timeBox"
class="item gray"
>
---
</div>

<hr>

<div
id="medicineBox"
class="item"
>
---
</div>

<div
id="alertBox"
class="item red"
>
---
</div>

<div
id="locationBox"
class="item blue"
>
---
</div>

</div>

</div>

<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbyVLKBp9HiMTvBT9GAPtpYKg6ppmUOKkpRQQbIFOudhXk9X_pU8ecRKUurtUcKKWD04/exec?code=YAMA1234';



async function loadData(){

try{

const response =
await fetch(GAS_URL);

const data =
await response.json();

const rows =
data.rows || [];



console.log(rows);



if(rows.length === 0){

document.getElementById(
'statusBox'
).innerHTML =
'データなし';

return;

}



const latest =
rows[rows.length - 1];



document.getElementById(
'statusBox'
).innerHTML =

'😊 ' +
(latest.status || '確認中');



document.getElementById(
'timeBox'
).innerHTML =

'最終確認：' +
(latest.datetime || '');



let medicineHtml = '';

let alertHtml = '';

let locationHtml = '';



rows.reverse().forEach(row => {

if(row.type === '薬'){

medicineHtml +=

'💊 ' +
row.status +
' ' +
row.time +
'<br>';

}



if(row.type === '緊急'){

alertHtml +=

'🆘 ' +
row.status +
' ' +
row.time +
'<br>';

}



if(row.type === '位置情報'){

locationHtml +=

'<a target="_blank" href="https://maps.google.com/?q=' +

row.lat +

',' +

row.lng +

'">📍 現在地を見る</a>';

}

});



document.getElementById(
'medicineBox'
).innerHTML =

medicineHtml ||

'💊 薬記録なし';



document.getElementById(
'alertBox'
).innerHTML =

alertHtml ||

'🆘 緊急記録なし';



document.getElementById(
'locationBox'
).innerHTML =

locationHtml ||

'📍 位置情報なし';



}

catch(err){

document.getElementById(
'statusBox'
).innerHTML =

'通信エラー';

}

}



loadData();

setInterval(
loadData,
10000
);

</script>

</body>
</html>
