<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>地域瓦版DX</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#eef3f8;
font-family:
-apple-system,
BlinkMacSystemFont,
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#222;
}

.wrap{
max-width:760px;
margin:0 auto;
padding:20px 16px 140px;
}

.hero{
background:#fff;
border-radius:30px;
padding:28px;
margin-bottom:24px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.hero-title{
font-size:42px;
font-weight:900;
margin-bottom:18px;
}

.hero-desc{
font-size:24px;
line-height:1.8;
font-weight:700;
color:#555;
}

.section-title{
font-size:34px;
font-weight:900;
margin:26px 0 18px;
}

#news-area{
display:flex;
flex-direction:column;
gap:22px;
}

.card{
background:#fff;
border-radius:28px;
padding:24px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.city{
display:inline-block;
background:#4da3ff;
color:#fff;
font-size:20px;
font-weight:900;
padding:8px 16px;
border-radius:999px;
margin-bottom:16px;
}

.title{
font-size:32px;
font-weight:900;
line-height:1.6;
margin-bottom:16px;
}

.date{
font-size:20px;
font-weight:700;
color:#666;
margin-bottom:18px;
}

.desc{
font-size:24px;
line-height:1.9;
font-weight:700;
color:#444;
margin-top:18px;
white-space:pre-wrap;
}

.image-scroll{
display:flex;
overflow-x:auto;
gap:14px;
padding-bottom:10px;
margin:18px 0;
}

.image-scroll img{
width:240px;
height:430px;
object-fit:cover;
border-radius:20px;
flex-shrink:0;
background:#ddd;
}

.video-wrap{
margin:18px 0;
}

.video-wrap iframe,
.video-wrap video{
width:100%;
border:none;
border-radius:20px;
}

.link-btn{
display:block;
width:100%;
text-align:center;
text-decoration:none;
background:#58c86b;
color:#fff;
font-size:26px;
font-weight:900;
padding:22px;
border-radius:22px;
margin-top:16px;
}

.loading{
font-size:28px;
font-weight:900;
text-align:center;
padding:50px 20px;
color:#666;
}

</style>
</head>

<body>

<div class="wrap">

<div class="hero">

<div class="hero-title">
📰 地域瓦版DX
</div>

<div class="hero-desc">
志木・新座・朝霞・和光の
暮らし情報・地域ニュース
</div>

</div>

<div class="section-title">
最新の記事
</div>

<div id="news-area">

<div class="loading">
読み込み中...
</div>

</div>

</div>

<script>

const SHEET_ID =
'13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';

const JSONP_URL =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?tqx=out:json';



function getCell(cell){

if(!cell)return '';

if(cell.v !== undefined)return String(cell.v);

if(cell.f !== undefined)return String(cell.f);

return '';

}



function extractUrls(text){

if(!text)return [];

const matches =
text.match(/https?:\/\/[^\s]+/g);

return matches || [];

}



function isYoutube(url){

return (
url.includes('youtube.com')
||
url.includes('youtu.be')
);

}



function isImage(url){

return (
url.includes('.jpg')
||
url.includes('.jpeg')
||
url.includes('.png')
||
url.includes('.webp')
||
url.includes('googleusercontent')
||
url.includes('drive.google.com')
);

}



function isVideo(url){

return (
url.includes('.mp4')
||
url.includes('.mov')
||
url.includes('.webm')
);

}



function youtubeEmbed(url){

if(url.includes('watch?v=')){

return url.replace(
'watch?v=',
'embed/'
);

}

if(url.includes('youtu.be/')){

const id =
url.split('youtu.be/')[1];

return 'https://www.youtube.com/embed/' + id;

}

return url;

}



function formatDate(value){

if(!value)return '';

if(value.includes('Date(')){

const nums =
value.match(/\d+/g);

if(nums){

return (
nums[0] + '/' +
(Number(nums[1]) + 1) + '/' +
nums[2]
);

}

}

return value;

}



window.google = {
visualization:{
Query:{
setResponse:function(res){

const rows =
res.table.rows || [];

const area =
document.getElementById(
'news-area'
);

area.innerHTML = '';



rows.reverse();



rows.slice(0,5).forEach(row => {

const c = row.c;



const date =
formatDate(
getCell(c[0])
);

const title =
getCell(c[2]);

const detail =
getCell(c[4]);

const displayType =
getCell(c[21]);



let allText = '';

c.forEach(cell => {

allText +=
' ' + getCell(cell);

});



const urls =
extractUrls(allText);



let mediaHtml = '';



urls.forEach(url => {



if(isYoutube(url)){

mediaHtml +=

'<div class="video-wrap">' +

'<iframe ' +
'src="' +
youtubeEmbed(url) +
'" ' +
'height="220" ' +
'allowfullscreen>' +

'</iframe>' +

'</div>';

}



else if(isVideo(url)){

mediaHtml +=

'<div class="video-wrap">' +

'<video controls>' +

'<source src="' +
url +
'">' +

'</video>' +

'</div>';

}



else if(isImage(url)){

mediaHtml +=

'<div class="image-scroll">' +

'<img src="' +
url +
'">' +

'</div>';

}

});



let infoButtons = '';



for(let i = 5; i <= 15; i += 2){

const infoTitle =
getCell(c[i]);

const infoUrl =
getCell(c[i + 1]);



if(
infoTitle &&
infoUrl &&
infoUrl.startsWith('http')
){

infoButtons +=

'<a class="link-btn" ' +

'href="' +
infoUrl +
'" ' +

'target="_blank">' +

infoTitle +

'</a>';

}

}



const html =

'<div class="card">' +

'<div class="city">' +
displayType +
'</div>' +

'<div class="title">' +
title +
'</div>' +

'<div class="date">' +
date +
'</div>' +

mediaHtml +

'<div class="desc">' +
detail +
'</div>' +

infoButtons +

'</div>';



area.insertAdjacentHTML(
'beforeend',
html
);

});

}
}
}
};



const script =
document.createElement('script');

script.src = JSONP_URL;

document.body.appendChild(script);

</script>

</body>
</html>
