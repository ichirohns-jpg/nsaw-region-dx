<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>地域瓦版DX</title>

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:#eef3f8;
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#222;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:20px 16px 140px;
}

.hero{
  background:#fff;
  border-radius:30px;
  padding:28px;
  margin-bottom:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.hero-title{
  font-size:42px;
  font-weight:900;
  margin-bottom:18px;
}

.hero-desc{
  font-size:24px;
  line-height:1.8;
  font-weight:700;
  color:#555;
}

.section-title{
  font-size:34px;
  font-weight:900;
  margin:26px 0 18px;
}

#latest-area,
#archive-area{
  display:flex;
  flex-direction:column;
  gap:22px;
}

.card{
  background:#fff;
  border-radius:28px;
  padding:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.city{
  display:inline-block;
  background:#4da3ff;
  color:#fff;
  font-size:20px;
  font-weight:900;
  padding:8px 16px;
  border-radius:999px;
  margin-bottom:16px;
}

.title{
  font-size:32px;
  font-weight:900;
  line-height:1.6;
  margin-bottom:16px;
}

.date{
  font-size:20px;
  font-weight:700;
  color:#666;
  margin-bottom:18px;
}

.desc{
  font-size:24px;
  line-height:1.9;
  font-weight:700;
  color:#444;
  margin-top:18px;
  white-space:pre-wrap;
}

.image-scroll{
  display:flex;
  overflow-x:auto;
  gap:14px;
  padding-bottom:10px;
  margin:18px 0;
}

.image-scroll img{
  width:240px;
  height:430px;
  object-fit:cover;
  border-radius:20px;
  flex-shrink:0;
  background:#ddd;
}

.video-wrap{
  margin:18px 0;
}

.video-wrap iframe{
  width:100%;
  height:220px;
  border:none;
  border-radius:20px;
}

.link-btn{
  display:block;
  width:100%;
  text-align:center;
  text-decoration:none;
  background:#58c86b;
  color:#fff;
  font-size:26px;
  font-weight:900;
  padding:22px;
  border-radius:22px;
  margin-top:16px;
}

.loading{
  font-size:28px;
  font-weight:900;
  text-align:center;
  padding:50px 20px;
  color:#666;
}

.bottom-menu{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:14px 0;
  box-shadow:0 -4px 14px rgba(0,0,0,.10);
  z-index:999;
}

.bottom-btn{
  text-decoration:none;
  color:#222;
  font-size:16px;
  font-weight:900;
  text-align:center;
  width:25%;
}

.bottom-icon{
  display:block;
  font-size:28px;
  margin-bottom:4px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="hero">

<div class="hero-title">
📰 地域瓦版DX
</div>

<div class="hero-desc">
志木・新座・朝霞・和光の
暮らし情報・地域ニュース
</div>

</div>



<div class="section-title">
最新の記事
</div>

<div id="latest-area">

<div class="loading">
読み込み中...
</div>

</div>



<div class="section-title">
過去の記事
</div>

<div id="archive-area">

</div>

</div>



<div class="bottom-menu">

<a class="bottom-btn" href="./">
<span class="bottom-icon">🏠</span>
ホーム
</a>

<a class="bottom-btn" href="./profile.html">
<span class="bottom-icon">⚙️</span>
地域
</a>

<a class="bottom-btn" href="./map.html">
<span class="bottom-icon">🗺️</span>
地図
</a>

<a class="bottom-btn" href="./consult.html">
<span class="bottom-icon">🤖</span>
相談
</a>

</div>



<script>

const SHEET_ID =
'13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';



const JSONP_URL =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?tqx=out:json';



function val(cell){

if(!cell)return '';

if(cell.v !== undefined)return String(cell.v);

if(cell.f !== undefined)return String(cell.f);

return '';

}



/* =========================
   日付変換
========================= */

function fmtDate(v){

if(!v)return '';

if(v.includes('Date(')){

const n = v.match(/\d+/g);

if(n){

return (
n[0] + '/' +
(Number(n[1])+1) + '/' +
n[2]
);

}

}

return v;

}



/* =========================
   Drive画像変換
========================= */

function driveImage(url){

if(!url)return '';

if(url.includes('drive.google.com')){

const m =
url.match(/\/d\/([^/]+)/)
||
url.match(/id=([^&]+)/);

if(m && m[1]){

return (
'https://drive.google.com/thumbnail?id=' +
m[1] +
'&sz=w1200'
);

}

}

return url;

}



/* =========================
   YouTube変換
========================= */

function youtube(url){

if(url.includes('watch?v=')){

return url.replace(
'watch?v=',
'embed/'
);

}

if(url.includes('youtu.be/')){

const id =
url.split('youtu.be/')[1]
.split('?')[0];

return (
'https://www.youtube.com/embed/' +
id
);

}

return url;

}



/* =========================
   カード生成
========================= */

function createCard(c){

/* =========================
   固定列
========================= */

const date =
fmtDate(
val(c[0])
);

const title =
val(c[2]);

const imageUrl =
val(c[3]);

const detail =
val(c[4]);

const videoTitle =
val(c[15]);

const videoDetail =
val(c[16]);

const mediaUrl =
val(c[17]);

const displayType =
val(c[21]) || '地域情報';



/* =========================
   画像・動画
========================= */

let mediaHtml = '';



/* D列画像 */

if(imageUrl){

mediaHtml +=

'<div class="image-scroll">' +

'<img src="' +
driveImage(imageUrl) +
'">' +

'</div>';

}



/* R列動画 */

if(
mediaUrl &&
(
mediaUrl.includes('youtube.com')
||
mediaUrl.includes('youtu.be')
)
){

mediaHtml +=

'<div class="video-wrap">' +

'<iframe ' +
'src="' +
youtube(mediaUrl) +
'" ' +
'allowfullscreen>' +

'</iframe>' +

'</div>';

}



/* =========================
   各市リンク
========================= */

let buttons = '';



const links = [

{
title: val(c[5]),
url: val(c[6])
},

{
title: val(c[7]),
url: val(c[8])
},

{
title: val(c[9]),
url: val(c[10])
},

{
title: val(c[11]),
url: val(c[12])
},

{
title: val(c[13]),
url: val(c[14])
}

];



links.forEach(link => {

if(
link.title &&
link.url &&
link.url.startsWith('http')
){

buttons +=

'<a class="link-btn" ' +

'href="' +
link.url +
'" ' +

'target="_blank">' +

link.title +

'</a>';

}

});



/* =========================
   動画ボタン
========================= */

if(
videoTitle &&
mediaUrl &&
mediaUrl.startsWith('http')
){

buttons +=

'<a class="link-btn" ' +

'href="' +
mediaUrl +
'" ' +

'target="_blank">' +

videoTitle +

'</a>';

}



/* =========================
   説明文
========================= */

let fullDetail = detail;

if(videoDetail){

fullDetail +=
'\n\n' +
videoDetail;

}



/* =========================
   カード完成
========================= */

return (

'<div class="card">' +

'<div class="city">' +
displayType +
'</div>' +

'<div class="title">' +
title +
'</div>' +

'<div class="date">' +
date +
'</div>' +

mediaHtml +

'<div class="desc">' +
fullDetail +
'</div>' +

buttons +

'</div>'

);

}



/* =========================
   JSONP
========================= */

window.google = {
visualization:{
Query:{
setResponse:function(res){

const rows =
res.table.rows || [];



const latest =
document.getElementById(
'latest-area'
);

const archive =
document.getElementById(
'archive-area'
);



latest.innerHTML = '';
archive.innerHTML = '';



rows.reverse();



/* =========================
   最新5件
========================= */

rows.slice(0,5).forEach(row => {

latest.insertAdjacentHTML(
'beforeend',
createCard(row.c)
);

});



/* =========================
   6件目以降
========================= */

rows.slice(5).forEach(row => {

archive.insertAdjacentHTML(
'beforeend',
createCard(row.c)
);

});

}
}
}
};



const s =
document.createElement('script');

s.src = JSONP_URL;

document.body.appendChild(s);

</script>

</body>
</html>
