<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>地域マップ</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:0;
background:#f1f4f7;
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
color:#222;
}

.wrap{
max-width:720px;
margin:0 auto;
padding:22px 16px 120px;
}

.header{
font-size:38px;
font-weight:900;
margin-bottom:18px;
line-height:1.35;
}

.card{
background:#fff;
border-radius:28px;
padding:26px;
margin-bottom:20px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.title{
font-size:32px;
font-weight:900;
margin-bottom:20px;
}

.btn{
width:100%;
border:none;
border-radius:22px;
padding:26px;
margin-bottom:16px;
font-size:30px;
font-weight:900;
background:#58c86b;
color:#fff;
}

.gray{
background:#f4f6f8;
color:#222;
}

.result{
font-size:24px;
font-weight:900;
line-height:1.6;
margin-top:12px;
}

.bottom-menu{
position:fixed;
left:0;
right:0;
bottom:0;
background:#fff;
display:flex;
justify-content:space-around;
padding:14px 0;
box-shadow:0 -4px 14px rgba(0,0,0,.10);
z-index:999;
}

.bottom-btn{
text-decoration:none;
color:#222;
font-size:16px;
font-weight:900;
text-align:center;
width:25%;
}

.bottom-icon{
display:block;
font-size:28px;
margin-bottom:4px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="header">
🗺 地域マップ
</div>



<div class="card">

<div class="title">
📍 現在地
</div>

<button
class="btn"
onclick="getLocation()"
>
📍 現在地を確認
</button>

<div
id="result"
class="result"
>
まだ取得していません
</div>

</div>



<div class="card">

<div class="title">
🏥 よく使う地図
</div>

<button
class="btn gray"
onclick="openMap('hospital')"
>
🏥 病院
</button>

<button
class="btn gray"
onclick="openMap('drugstore')"
>
💊 薬局
</button>

<button
class="btn gray"
onclick="openMap('convenience store')"
>
🏪 コンビニ
</button>

</div>

</div>



<div class="bottom-menu">

<a class="bottom-btn" href="./">
<span class="bottom-icon">🏠</span>
ホーム
</a>

<a class="bottom-btn" href="./family.html">
<span class="bottom-icon">👪</span>
家族
</a>

<a class="bottom-btn" href="./map.html">
<span class="bottom-icon">🗺</span>
地図
</a>

<a class="bottom-btn" href="#">
<span class="bottom-icon">🤖</span>
相談
</a>

</div>



<script>

let currentLat = null;
let currentLng = null;



function getLocation(){

if(!navigator.geolocation){

document.getElementById('result').innerHTML =
'位置情報に対応していません';

return;

}



navigator.geolocation.getCurrentPosition(

(position)=>{

currentLat =
position.coords.latitude;

currentLng =
position.coords.longitude;



document.getElementById('result').innerHTML =

'📍 取得成功<br><br>' +

currentLat +

'<br>' +

currentLng;

},

()=>{

document.getElementById('result').innerHTML =
'位置情報を取得できません';

}

);

}



function openMap(keyword){

if(currentLat === null){

alert('先に現在地を取得してください');

return;

}



const url =

'https://www.google.com/maps/search/' +

encodeURIComponent(keyword) +

'/@' +

currentLat +

',' +

currentLng +

',15z';



window.open(url,'_blank');

}

</script>

</body>
</html>
