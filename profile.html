<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>地域設定DX</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#f1f4f7;
font-family:
-apple-system,
BlinkMacSystemFont,
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#222;
}

.wrap{
max-width:720px;
margin:0 auto;
padding:22px 16px 120px;
}

.header{
font-size:38px;
font-weight:900;
margin-bottom:20px;
line-height:1.4;
}

.card{
background:#fff;
border-radius:28px;
padding:26px;
box-shadow:
0 8px 24px rgba(0,0,0,.08);
}

.title{
font-size:34px;
font-weight:900;
margin-bottom:18px;
}

.desc{
font-size:24px;
line-height:1.8;
font-weight:700;
color:#444;
margin-bottom:24px;
}

label{
display:block;
font-size:26px;
font-weight:900;
margin:22px 0 10px;
}

select{
width:100%;
font-size:28px;
padding:18px;
border-radius:18px;
border:1px solid #ddd;
background:#f7f9fb;
}

.btn{
width:100%;
border:none;
border-radius:22px;
padding:28px;
font-size:32px;
font-weight:900;
background:#58c86b;
color:#fff;
margin-top:28px;
}

.result{
margin-top:24px;
font-size:25px;
font-weight:900;
line-height:1.8;
white-space:pre-wrap;
background:#f7f9fb;
border-radius:22px;
padding:22px;
min-height:160px;
}

.bottom-menu{
position:fixed;
left:0;
right:0;
bottom:0;
background:#fff;
display:flex;
justify-content:space-around;
padding:14px 0;
box-shadow:
0 -4px 14px rgba(0,0,0,.10);
z-index:999;
}

.bottom-btn{
text-decoration:none;
color:#222;
font-size:16px;
font-weight:900;
text-align:center;
width:25%;
}

.bottom-icon{
display:block;
font-size:28px;
margin-bottom:4px;
}

</style>

</head>

<body>

<div class="wrap">

<div class="header">
⚙️ 地域設定DX
</div>

<div class="card">

<div class="title">
お住まいの地域を設定
</div>

<div class="desc">
ごみ・病院・避難所・地域情報などを、
あなたの地域に合わせて案内します。
</div>



<label>
市を選ぶ
</label>

<select id="city">
<option value="志木市">志木市</option>
<option value="新座市">新座市</option>
<option value="朝霞市">朝霞市</option>
<option value="和光市">和光市</option>
</select>



<label>
町名を選ぶ
</label>

<select id="town">
</select>



<label>
丁目を選ぶ
</label>

<select id="chome">
<option value="1丁目">1丁目</option>
<option value="2丁目">2丁目</option>
<option value="3丁目">3丁目</option>
<option value="4丁目">4丁目</option>
<option value="5丁目">5丁目</option>
<option value="6丁目">6丁目</option>
<option value="7丁目">7丁目</option>
<option value="8丁目">8丁目</option>
</select>



<button
class="btn"
onclick="saveProfile()"
>
この地域で保存
</button>



<div
id="result"
class="result"
>
まだ地域設定は保存されていません
</div>

</div>
</div>



<div class="bottom-menu">

<a class="bottom-btn" href="./">
<span class="bottom-icon">🏠</span>
ホーム
</a>

<a class="bottom-btn" href="./profile.html">
<span class="bottom-icon">⚙️</span>
地域
</a>

<a class="bottom-btn" href="./map.html">
<span class="bottom-icon">🗺</span>
地図
</a>

<a class="bottom-btn" href="./consult.html">
<span class="bottom-icon">🤖</span>
相談
</a>

</div>



<script>

const townData = {

"志木市":[
"本町",
"柏町",
"幸町",
"館",
"上宗岡",
"中宗岡",
"下宗岡"
],

"新座市":[
"東北",
"野火止",
"栗原",
"片山",
"新堀",
"石神"
],

"朝霞市":[
"本町",
"仲町",
"根岸台",
"栄町",
"膝折"
],

"和光市":[
"本町",
"白子",
"丸山台",
"中央",
"南"
]

};



const citySelect =
document.getElementById('city');

const townSelect =
document.getElementById('town');



function updateTownOptions(){

const city =
citySelect.value;

townSelect.innerHTML = '';

townData[city].forEach(
town => {

const option =
document.createElement('option');

option.value = town;

option.textContent = town;

townSelect.appendChild(option);

}
);

}



citySelect.addEventListener(
'change',
updateTownOptions
);



function saveProfile(){

const profile = {

city:
document.getElementById('city').value,

town:
document.getElementById('town').value,

chome:
document.getElementById('chome').value

};



localStorage.setItem(
'NSAW_PROFILE',
JSON.stringify(profile)
);



document
.getElementById('result')
.innerText =

'保存しました\n\n' +

profile.city + ' ' +
profile.town + ' ' +
profile.chome;

}



function loadProfile(){

updateTownOptions();



const saved =
localStorage.getItem(
'NSAW_PROFILE'
);



if(!saved)return;



const profile =
JSON.parse(saved);



document
.getElementById('city')
.value =
profile.city;



updateTownOptions();



document
.getElementById('town')
.value =
profile.town;

document
.getElementById('chome')
.value =
profile.chome;



document
.getElementById('result')
.innerText =

'現在の設定\n\n' +

profile.city + ' ' +
profile.town + ' ' +
profile.chome;

}



loadProfile();

</script>

</body>
</html>
