<!DOCTYPE html>
<html lang="ja">
<head>

<style>

.card img{width:100%;display:block;}
.body{padding:22px;}
.date{font-size:18px;color:#666;margin-bottom:8px;}
.title{font-size:28px;font-weight:900;line-height:1.45;margin-bottom:14px;}

</style>
</head>
<body>
<div class="wrap">

<div id="list"></div>
</div>

<script>
const POSTS = [{"date":"2026-05-19T15:00:00.000Z","id":"007","title":"5月20日 四市かわら版","image":"https://drive.google.com/thumbnail?id=1Pu3rQldHEQ4DXryPo4O9kTQQUitw95_R&sz=w1600","text":"5月20日の志木・新座・朝霞・和光の暮らし情報をまとめました。気になる情報は下のボタンから確認できます。"},{"date":"","id":"","title":"🎬 本日のお楽しみ動画｜懐かし昭和歌謡BGM","image":"","text":""},{"date":"2026-05-18T15:00:00.000Z","id":"005","title":"5月19日 四市かわら版","image":"https://drive.google.com/thumbnail?id=1weO1_pqGhYZ2fw7mNWad8NN6diA8TQfd&sz=w1200","text":"5月19日の志木・新座・朝霞・和光の暮らし情報をまとめました。気になる情報は下のボタンから確認できます。"},{"date":"2026-05-17T15:00:00.000Z","id":"004","title":"今日のお楽しみ動画です","image":"","text":""},{"date":"2026-05-17T15:00:00.000Z","id":"003","title":"5月18日 四市かわら版","image":"https://drive.google.com/thumbnail?id=1lF_l-Wr0c4-Do2bnLsxRXUWIo5Wbz6aG&sz=w1200","text":"5月18日の志木・新座・朝霞・和光の暮らし情報をまとめました。気になる情報は下のボタンから確認できます。"},{"date":"2026-05-16T15:00:00.000Z","id":"002","title":"今日のお楽しみ動画です！病院での待ち時間などにイヤホンでお楽しみください🎧","image":"","text":""},{"date":"2026-05-16T15:00:00.000Z","id":"001","title":"5月17日 四市かわら版","image":"https://drive.google.com/thumbnail?id=1W-aF4ZWw9F4HNfH6-2qd7tHnnKRKDddk&sz=w1200","text":"5月17日の志木・新座・朝霞・和光の暮らし情報をまとめました。気になる情報は下のボタンから確認できます。"}];

const list = document.getElementById('list');

POSTS.forEach(post => {
  const card = document.createElement('div');
  card.className = 'card';

  card.innerHTML =
    (post.image ? '<img src="' + post.image + '">' : '') +
    '<div class="body">' +
    '<div class="date">' + post.date + '</div>' +
    '<div class="title">' + post.title + '</div>' +

    '</div>';

  list.appendChild(card);
});
</script>
</body>
