<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW地域DX</title>

<style>

body{
margin:0;
padding:16px;
background:#eef3f8;
font-family:sans-serif;
}

.box{
background:#fff;
border-radius:24px;
padding:24px;
margin-bottom:24px;
}

.title{
font-size:40px;
font-weight:900;
margin-bottom:20px;
}

.btn{
width:100%;
border:none;
border-radius:20px;
padding:24px;
margin-bottom:16px;
font-size:32px;
font-weight:900;
}

.green{
background:#5cc96b;
color:#fff;
}

.gray{
background:#f3f5f7;
}

.result{
font-size:24px;
font-weight:900;
color:#22aa44;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="box">

<div class="title">
😊 今日の状態
</div>

<button
class="btn green"
onclick="showGood()"
>
😊 元気です
</button>

<div
id="goodResult"
class="result"
></div>

</div>



<div class="box">

<div class="title">
💊 今日の薬
</div>

<button
class="btn gray"
onclick="takeMorningMedicine()"
>
💊 朝の薬
</button>

<div
id="morningResult"
class="result"
></div>



<button
class="btn gray"
onclick="takeLunchMedicine()"
>
💊 昼の薬
</button>

<div
id="lunchResult"
class="result"
></div>



<button
class="btn gray"
onclick="takeNightMedicine()"
>
💊 夜の薬
</button>

<div
id="nightResult"
class="result"
></div>

</div>

<script>

function getNowTime(){

return new Date()
.toLocaleTimeString(
'ja-JP',
{
hour:'2-digit',
minute:'2-digit'
}
);

}



function showGood(){

const time =
getNowTime();

document.getElementById(
'goodResult'
).innerHTML =

'✅ 元気確認 ' + time;

}



function takeMorningMedicine(){

const time =
getNowTime();

document.getElementById(
'morningResult'
).innerHTML =

'✅ 飲みました ' + time;

}



function takeLunchMedicine(){

const time =
getNowTime();

document.getElementById(
'lunchResult'
).innerHTML =

'✅ 飲みました ' + time;

}



function takeNightMedicine(){

const time =
getNowTime();

document.getElementById(
'nightResult'
).innerHTML =

'✅ 飲みました ' + time;

}

</script>

</body>
</html>
