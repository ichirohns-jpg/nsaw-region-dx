<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW地域DX</title>

<meta name="description" content="志木・新座・朝霞・和光の地域生活情報">

<meta property="og:title" content="NSAW地域DX">
<meta property="og:description" content="志木・新座・朝霞・和光の地域生活情報">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-region-dx/ogp.jpg">
<meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-region-dx/">

<meta name="twitter:card" content="summary_large_image">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:18px;
  background:#eef3f8;
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#222;
}

.wrap{
  max-width:760px;
  margin:0 auto;
}

.main-title{
  font-size:44px;
  font-weight:900;
  line-height:1.4;
  margin:
  14px 0
  28px;
}



/* 今日の予定 */

.today-box{
  background:#fff8dc;
  border-radius:28px;
  padding:24px;
  margin-bottom:36px;
  box-shadow:
  0 6px 18px
  rgba(0,0,0,.08);
}

.today-title{
  font-size:36px;
  font-weight:900;
  margin-bottom:18px;
}

.today-link{
  text-decoration:none;
  color:#222;
  display:block;
}

.today-item{
  font-size:28px;
  line-height:1.8;
  margin-bottom:12px;
}



/* 元気ボックス */

.health-box{
  background:#ffffff;
  border-radius:28px;
  padding:24px;
  margin-bottom:36px;
  box-shadow:
  0 8px 24px
  rgba(0,0,0,.10);
}

.health-title{
  font-size:36px;
  font-weight:900;
  margin-bottom:20px;
}

.health-btn{
  width:100%;
  border:none;
  border-radius:20px;
  padding:24px;
  margin-bottom:18px;
  font-size:30px;
  font-weight:900;
}

.good-btn{
  background:#5cc96b;
  color:#fff;
}

.normal-btn{
  background:#ffd54f;
  color:#222;
}

.danger-btn{
  background:#ef5350;
  color:#fff;
}

.sub-btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:20px;
  margin-bottom:14px;
  background:#f3f5f7;
  font-size:24px;
  font-weight:900;
}

.danger-call{
  display:block;
  text-decoration:none;
  text-align:center;
  background:#ef5350;
  color:#fff;
  border-radius:18px;
  padding:22px;
  margin-bottom:14px;
  font-size:26px;
  font-weight:900;
}



/* カード */

.card{
  background:#fff;
  border-radius:28px;
  overflow:hidden;
  margin-bottom:34px;
  box-shadow:
  0 8px 24px
  rgba(0,0,0,.10);
}

.card img{
  width:100%;
  display:block;
}

.card-body{
  padding:24px;
}

.date{
  font-size:18px;
  color:#666;
  margin-bottom:10px;
}

.title{
  font-size:32px;
  font-weight:900;
  line-height:1.5;
  margin-bottom:18px;
}

.text{
  font-size:22px;
  line-height:1.9;
  white-space:pre-wrap;
}



/* ボタン */

.link-btn{
  display:block;
  width:100%;
  background:#2f6df6;
  color:#fff;
  text-decoration:none;
  text-align:center;
  font-size:24px;
  font-weight:900;
  border-radius:18px;
  padding:18px;
  margin-top:14px;
}



/* 動画 */

.video-title{
  font-size:24px;
  font-weight:900;
  margin:
  28px 0
  14px;
}

.video-wrap{
  position:relative;
  width:100%;
  padding-top:56.25%;
  border-radius:22px;
  overflow:hidden;
  background:#000;
}

.video-wrap iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}



/* 下固定 */

.bottom-menu{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:12px 0;
  box-shadow:
  0 -4px 14px
  rgba(0,0,0,.12);
}

.bottom-btn{
  text-decoration:none;
  color:#222;
  font-size:18px;
  font-weight:900;
  text-align:center;
}

.bottom-icon{
  display:block;
  font-size:28px;
  margin-bottom:6px;
}

.footer-space{
  height:100px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="main-title">
NSAW地域DX
</div>



<!-- 今日の予定 -->

<div
class="today-box"
id="todayBox"
></div>



<!-- 元気ボックス -->

<div class="health-box">

<div class="health-title">
😊 今日の状態
</div>

<button
class="health-btn good-btn"
onclick="showGood()"
>
😊 元気です
</button>

<button
class="health-btn normal-btn"
onclick="toggleNormal()"
>
😐 ちょっと不調
</button>

<div
id="normalMenu"
style="display:none;"
>

<button class="sub-btn">
体調が悪い
</button>

<button class="sub-btn">
転んだ
</button>

<button class="sub-btn">
薬がない
</button>

<button class="sub-btn">
食べ物がない
</button>

<button class="sub-btn">
病院に行きたい
</button>

<button class="sub-btn">
誰かに電話したい
</button>

</div>

<button
class="health-btn danger-btn"
onclick="toggleDanger()"
>
🆘 困っています
</button>

<div
id="dangerMenu"
style="display:none;"
>

<a
class="danger-call"
href="tel:119"
>
🚑 119
</a>

<a
class="danger-call"
href="tel:110"
>
🚓 110
</a>

<a
class="danger-call"
href="tel:0484731111"
>
☎ 地域包括
</a>

<a
class="danger-call"
href="tel:09012345678"
>
👨 家族に電話
</a>

</div>

</div>



<!-- 記事一覧 -->

<div id="list"></div>

<div class="footer-space"></div>

</div>



<!-- 下固定 -->

<div class="bottom-menu">

<a class="bottom-btn" href="#">
<span class="bottom-icon">🏠</span>
ホーム
</a>

<a class="bottom-btn" href="#">
<span class="bottom-icon">📅</span>
予定
</a>

<a class="bottom-btn" href="#">
<span class="bottom-icon">🗺</span>
地図
</a>

<a class="bottom-btn" href="#">
<span class="bottom-icon">😊</span>
元気
</a>

</div>



<script>



/* 今日の予定 */

const todayBox =
document.getElementById(
'todayBox'
);



const todayData = [

{
icon:'🏥',
text:'10:00 歯医者',
url:'https://www.google.com/maps'
},

{
icon:'💊',
text:'朝の薬',
url:'#'
},

{
icon:'🗑',
text:'明日は燃えるごみ',
url:'#'
}

];



todayBox.innerHTML = `

<div class="today-title">
☀ 今日の予定
</div>

` +

todayData.map(item => `

<a
class="today-link"
href="${item.url}"
target="_blank"
>

<div class="today-item">
${item.icon}
${item.text}
</div>

</a>

`).join('');



/* 元気ボタン */

function showGood(){

alert(
'😊 元気を記録しました'
);

}



function toggleNormal(){

const menu =
document.getElementById(
'normalMenu'
);

menu.style.display =
menu.style.display === 'none'
? 'block'
: 'none';

}



function toggleDanger(){

const menu =
document.getElementById(
'dangerMenu'
);

menu.style.display =
menu.style.display === 'none'
? 'block'
: 'none';

}



/* 記事 */

fetch('data.json')

.then(res => res.json())

.then(posts => {

const list =
document.getElementById('list');



posts.forEach(post => {

const card =
document.createElement('div');

card.className = 'card';



const links = [

[post.info1Title, post.info1Url],
[post.info2Title, post.info2Url],
[post.info3Title, post.info3Url],
[post.info4Title, post.info4Url],
[post.info5Title, post.info5Url]

]

.map(pair => {

if(!pair[0]) return '';

return `
<a
class="link-btn"
href="${pair[1]}"
target="_blank"
>
${pair[0]}
</a>
`;

})

.join('');



card.innerHTML =

`
${post.image
? `<img src="${post.image}">`
: ''
}

<div class="card-body">

<div class="date">
${post.date}
</div>

<div class="title">
${post.title}
</div>

<div class="text">
${post.text}
</div>

${links}

${post.youtubeUrl
? `
<div class="video-title">
${post.videoTitle}
</div>

<div class="video-wrap">
<iframe
src="${post.youtubeUrl}"
allowfullscreen
></iframe>
</div>
`
: ''
}

</div>
`;



list.appendChild(card);

});

});

</script>

</body>
</html>
