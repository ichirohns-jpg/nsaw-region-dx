<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族見守りDX</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:20px;
background:#eef3f8;
font-family:
-apple-system,
BlinkMacSystemFont,
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#222;
}

.wrap{
max-width:760px;
margin:0 auto;
padding-bottom:120px;
}

.top-title{
font-size:52px;
font-weight:900;
margin-bottom:30px;
line-height:1.4;
}

.box{
background:#fff;
border-radius:32px;
padding:28px;
margin-bottom:28px;
box-shadow:
0 10px 28px rgba(0,0,0,.08);
}

.box-title{
font-size:40px;
font-weight:900;
margin-bottom:24px;
}

.btn{
width:100%;
border:none;
border-radius:24px;
padding:30px;
margin-bottom:18px;
font-size:38px;
font-weight:900;
}

.green{
background:#57c66a;
color:#fff;
}

.gray{
background:#f3f5f7;
color:#222;
}

.result{
font-size:28px;
font-weight:900;
color:#22aa44;
margin-bottom:12px;
line-height:1.6;
}

.bottom-menu{
position:fixed;
left:0;
right:0;
bottom:0;
background:#fff;
display:flex;
justify-content:space-around;
padding:14px 0;
box-shadow:
0 -4px 14px rgba(0,0,0,.10);
z-index:999;
}

.bottom-btn{
text-decoration:none;
color:#222;
font-size:18px;
font-weight:900;
text-align:center;
}

.bottom-icon{
display:block;
font-size:32px;
margin-bottom:4px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="top-title">
🏠 家族見守りDX
</div>

<div class="box">

<div class="box-title">
😊 今日の状態
</div>

<button
class="btn green"
onclick="showGood()"
>
😊 元気です
</button>

<div
id="goodResult"
class="result"
></div>

</div>



<div class="box">

<div class="box-title">
💊 今日の薬
</div>

<button
class="btn gray"
onclick="takeMorningMedicine()"
>
💊 朝の薬
</button>

<div
id="morningResult"
class="result"
></div>



<button
class="btn gray"
onclick="takeLunchMedicine()"
>
💊 昼の薬
</button>

<div
id="lunchResult"
class="result"
></div>



<button
class="btn gray"
onclick="takeNightMedicine()"
>
💊 夜の薬
</button>

<div
id="nightResult"
class="result"
></div>

</div>

</div>



<div class="bottom-menu">

<a
class="bottom-btn"
href="./"
>

<span class="bottom-icon">
🏠
</span>

ホーム

</a>



<a
class="bottom-btn"
href="./family.html"
>

<span class="bottom-icon">
👪
</span>

家族

</a>

</div>



<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbyFUX6w7KMKZ87PR37MrFaPgW1clmiTR5LigJO43XLVQCZ7IdsGLP6HXPeNMzd9qN1L/exec';

const USER_CODE =
'YAMA1234';

const USER_NAME =
'山口さん';



function getNowTime(){

return new Date()
.toLocaleTimeString(
'ja-JP',
{
hour:'2-digit',
minute:'2-digit'
}
);

}



function sendToGas(data){

fetch(

GAS_URL,

{

method:'POST',

mode:'no-cors',

headers:{
'Content-Type':'text/plain'
},

body:
JSON.stringify(data)

}

);

}



/* 元気 */

function showGood(){

const time =
getNowTime();



document.getElementById(
'goodResult'
).innerHTML =

'✅ 元気確認 ' + time;



sendToGas({

code:USER_CODE,
name:USER_NAME,

type:'元気',

status:'元気です',

time:time

});

}



/* 朝 */

function takeMorningMedicine(){

const time =
getNowTime();



document.getElementById(
'morningResult'
).innerHTML =

'✅ 飲みました ' + time;



sendToGas({

code:USER_CODE,
name:USER_NAME,

type:'薬',

status:'朝の薬',

time:time

});

}



/* 昼 */

function takeLunchMedicine(){

const time =
getNowTime();



document.getElementById(
'lunchResult'
).innerHTML =

'✅ 飲みました ' + time;



sendToGas({

code:USER_CODE,
name:USER_NAME,

type:'薬',

status:'昼の薬',

time:time

});

}



/* 夜 */

function takeNightMedicine(){

const time =
getNowTime();



document.getElementById(
'nightResult'
).innerHTML =

'✅ 飲みました ' + time;



sendToGas({

code:USER_CODE,
name:USER_NAME,

type:'薬',

status:'夜の薬',

time:time

});

}

</script>

</body>
</html>
