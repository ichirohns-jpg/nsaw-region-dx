<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW地域DX</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:18px;
  background:#eef3f8;
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#222;
}

.wrap{
  max-width:760px;
  margin:0 auto;
}

.clock-box,
.today-box,
.voice-result,
.health-box{
  background:#fff;
  border-radius:28px;
  margin-bottom:34px;
  box-shadow:
  0 8px 24px
  rgba(0,0,0,.10);
}

.clock-box{
  text-align:center;
  padding:28px;
}

.clock-date{
  font-size:30px;
  font-weight:900;
  margin-bottom:10px;
}

.clock-time{
  font-size:72px;
  font-weight:900;
}

.main-title{
  font-size:44px;
  font-weight:900;
  margin:14px 0 28px;
}



/* 今日の予定 */

.today-box{
  background:#fff8dc;
  padding:24px;
}

.today-title{
  font-size:36px;
  font-weight:900;
  margin-bottom:18px;
}

.today-item{
  font-size:28px;
  line-height:1.8;
  margin-bottom:12px;
}



/* 音声 */

.voice-btn{
  width:100%;
  border:none;
  border-radius:22px;
  padding:26px;
  margin-bottom:18px;
  background:#4a90e2;
  color:#fff;
  font-size:32px;
  font-weight:900;
}

.voice-result{
  padding:24px;
  font-size:26px;
  line-height:1.8;
  white-space:pre-wrap;
}

.voice-save{
  display:block;
  width:100%;
  text-decoration:none;
  text-align:center;
  border:none;
  border-radius:20px;
  padding:22px;
  margin-top:22px;
  background:#5cc96b;
  color:#fff;
  font-size:28px;
  font-weight:900;
}



/* 元気 */

.health-box{
  padding:24px;
}

.health-title{
  font-size:36px;
  font-weight:900;
  margin-bottom:20px;
}

.health-btn{
  width:100%;
  border:none;
  border-radius:20px;
  padding:24px;
  margin-bottom:18px;
  font-size:30px;
  font-weight:900;
}

.good-btn{
  background:#5cc96b;
  color:#fff;
}

.normal-btn{
  background:#ffd54f;
}

.danger-btn{
  background:#ef5350;
  color:#fff;
}

.sub-btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:20px;
  margin-bottom:14px;
  background:#f3f5f7;
  font-size:24px;
  font-weight:900;
}



/* 下固定 */

.bottom-menu{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:12px 0;
  box-shadow:
  0 -4px 14px
  rgba(0,0,0,.12);
}

.bottom-btn{
  text-decoration:none;
  color:#222;
  font-size:18px;
  font-weight:900;
  text-align:center;
}

.bottom-icon{
  display:block;
  font-size:28px;
  margin-bottom:6px;
}

.footer-space{
  height:100px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="clock-box">

<div
class="clock-date"
id="clockDate"
></div>

<div
class="clock-time"
id="clockTime"
></div>

</div>



<div class="main-title">
NSAW地域DX
</div>



<div
class="today-box"
id="todayBox"
></div>



<button
class="voice-btn"
onclick="startVoiceInput()"
>
🎤 話して予定追加
</button>



<div
class="voice-result"
id="voiceResult"
>
ここに話した内容が表示されます
</div>



<div class="health-box">

<div class="health-title">
😊 今日の状態
</div>

<button
class="health-btn good-btn"
onclick="showGood()"
>
😊 元気です
</button>

<button
class="health-btn normal-btn"
onclick="toggleNormal()"
>
😐 ちょっと不調
</button>

<div
id="normalMenu"
style="display:none;"
>

<button
class="sub-btn"
onclick="takeMedicine()"
>
💊 薬を飲みました
</button>

</div>

</div>

<div class="footer-space"></div>

</div>



<div class="bottom-menu">

<a class="bottom-btn" href="#">
<span class="bottom-icon">🏠</span>
ホーム
</a>

<a class="bottom-btn" href="#">
<span class="bottom-icon">📅</span>
予定
</a>

<a class="bottom-btn" href="#">
<span class="bottom-icon">😊</span>
元気
</a>

</div>



<script>



const GAS_URL =
'https://script.google.com/macros/s/AKfycbwHzZrES4KA7Levp619vnzmF9V38zRX-tzwPuu527BUIfH_K2pTuu-pPT0cZg_gTo6h/exec';



const USER_CODE =
'YAMA1234';



const USER_NAME =
'山口さん';



/* 時計 */

function updateClock(){

const now =
new Date();

document.getElementById(
'clockDate'
).innerText =

now.toLocaleDateString(
'ja-JP',
{
year:'numeric',
month:'long',
day:'numeric',
weekday:'long'
}
);

document.getElementById(
'clockTime'
).innerText =

now.toLocaleTimeString(
'ja-JP',
{
hour:'2-digit',
minute:'2-digit'
}
);

}

updateClock();

setInterval(
updateClock,
1000
);



/* 今日の予定 */

let todayData =

JSON.parse(
localStorage.getItem(
'todayData'
)
)

||

[];



function renderToday(){

document.getElementById(
'todayBox'
).innerHTML =

'<div class="today-title">📅 予定一覧</div>'

+

todayData.map(item =>

'<div class="today-item">' +
item.icon +
' ' +
item.text +
'</div>'

).join('');



localStorage.setItem(
'todayData',
JSON.stringify(todayData)
);

}

renderToday();



/* GAS送信 */

function sendToGas(data){

fetch(
GAS_URL,
{
method:'POST',

headers:{
'Content-Type':
'application/json'
},

body:
JSON.stringify(data)

}
);

}



/* Googleカレンダー */

function createGoogleCalendarUrl(parsed){

const title =
encodeURIComponent(
parsed.title
);

return

'https://calendar.google.com/calendar/render?action=TEMPLATE'

+

'&text=' +
title;

}



/* AI整理 */

function parseScheduleText(text){

let date = '未整理';

let time = '未整理';

let title = text;



const monthDay =

text.match(
/(\d{1,2})月(\d{1,2})日/
);

if(monthDay){

date =
monthDay[1] +
'月' +
monthDay[2] +
'日';

}



if(text.includes('時半')){

const halfMatch =

text.match(
/(\d{1,2})時半/
);

if(halfMatch){

time =
halfMatch[1]
.padStart(2,'0')
+
':30';

}

}



if(text.includes('歯医者')){

title = '歯医者';

}



return {

date:date,
time:time,
title:title

};

}



/* 音声 */

function startVoiceInput(){

const SpeechRecognition =

window.SpeechRecognition ||
window.webkitSpeechRecognition;



if(!SpeechRecognition){

document.getElementById(
'voiceResult'
).innerText =

'⚠ 音声入力できません';

return;

}



const recognition =
new SpeechRecognition();

recognition.lang = 'ja-JP';

recognition.interimResults = false;



recognition.onstart = function(){

document.getElementById(
'voiceResult'
).innerText =

'🎤 聞き取り中...';

};



recognition.onresult = function(event){

const text =

event.results[0][0]
.transcript;



const parsed =
parseScheduleText(text);



const calendarUrl =
createGoogleCalendarUrl(parsed);



document.getElementById(
'voiceResult'
).innerHTML =

'<div>🎤 ' +
text +
'</div>'

+

'<div style="margin-top:18px;font-weight:900;">AI整理結果</div>'

+

'<div>📅 日付：' +
parsed.date +
'</div>'

+

'<div>⏰ 時間：' +
parsed.time +
'</div>'

+

'<div>🏥 内容：' +
parsed.title +
'</div>'

+

'<button class="voice-save" onclick="saveSchedule(' +

JSON.stringify(parsed)
.replace(/"/g,'&quot;')

+

')">' +

'📅 予定に追加'

+

'</button>'

+

'<a class="voice-save" href="' +
calendarUrl +
'" target="_blank">' +

'📅 Googleカレンダーへ登録'

+

'</a>';

};



recognition.start();

}



/* 予定保存 */

function saveSchedule(parsed){

todayData.unshift({

icon:'📅',

text:
parsed.date +
' ' +
parsed.time +
' ' +
parsed.title

});



renderToday();



document.getElementById(
'voiceResult'
).innerHTML =

'✅ 予定へ追加しました';

}



/* 元気 */

function showGood(){

const now =
new Date();

const time =

now.toLocaleTimeString(
'ja-JP',
{
hour:'2-digit',
minute:'2-digit'
}
);



localStorage.setItem(
'genkiData',

JSON.stringify({

status:'元気です',
time:time

})

);



sendToGas({

code:USER_CODE,

name:USER_NAME,

genkiStatus:'元気です',

genkiTime:time,

medicineStatus:'未確認',

medicineTime:'--:--'

});



alert(
'😊 元気を記録しました'
);

}



/* 薬 */

function takeMedicine(){

const now =
new Date();

const time =

now.toLocaleTimeString(
'ja-JP',
{
hour:'2-digit',
minute:'2-digit'
}
);



localStorage.setItem(
'medicineData',

JSON.stringify({

status:'飲みました',
time:time

})

);



sendToGas({

code:USER_CODE,

name:USER_NAME,

genkiStatus:'元気です',

genkiTime:'保存済み',

medicineStatus:'飲みました',

medicineTime:time

});



alert(
'💊 薬を記録しました'
);

}



/* メニュー */

function toggleNormal(){

const menu =

document.getElementById(
'normalMenu'
);

menu.style.display =

menu.style.display === 'none'

? 'block'

: 'none';

}

</script>

</body>
</html>
