
<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW地域DX</title>

<style>

body{
  margin:0;
  padding:20px;
  background:#eef3f8;
  font-family:sans-serif;
}

.wrap{
  max-width:700px;
  margin:0 auto;
}

.title{
  font-size:36px;
  font-weight:bold;
  margin-bottom:25px;
}

.card{
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  margin-bottom:30px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  display:block;
}

.card-body{
  padding:20px;
}

.card-title{
  font-size:28px;
  font-weight:bold;
  line-height:1.5;
  margin-bottom:15px;
}

.card-text{
  font-size:20px;
  line-height:1.8;
  color:#333;
}

</style>

</head>

<body>

<div class="wrap">

<div class="title">
NSAW地域DX
</div>

<div id="list"></div>

</div>

<script>

fetch('https://script.google.com/macros/s/AKfycbwHzZrES4KA7Levp619vnzmF9V38zRX-tzwPuu527BUIfH_K2pTuu-pPT0cZg_gTo6h/exec')
.then(r => r.json())
.then(data => {

  const list =
    document.getElementById('list');

  data.reverse();

  data.forEach(item => {

    const rawImage =
      item['瓦版画像URL'] || '';

    let imageUrl = rawImage;

    if(rawImage.includes('/file/d/')){

      imageUrl =
        rawImage
          .replace(
            'https://drive.google.com/file/d/',
            'https://drive.google.com/thumbnail?id='
          )
          .replace(
            '/view?usp=drivesdk',
            '&sz=w1200'
          );

    }

    const card =
      document.createElement('div');

    card.className = 'card';

    card.innerHTML = `

      <img src="${imageUrl}">

      <div class="card-body">

        <div class="card-title">
          ${item['瓦版タイトル'] || ''}
        </div>

        <div class="card-text">
          ${item['説明文'] || ''}
        </div>

      </div>

    `;

    list.appendChild(card);

  });

})
.catch(err => {

  document.body.innerHTML +=
    '<pre style="color:red;">'+
    err +
    '</pre>';

});

</script>

</body>
</html>
