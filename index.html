<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW地域DX</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:16px;
background:#eef3f8;
font-family:
-apple-system,
BlinkMacSystemFont,
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#222;
}

.wrap{
max-width:760px;
margin:0 auto;
}

.box{
background:#fff;
border-radius:28px;
padding:24px;
margin-bottom:24px;
box-shadow:
0 8px 24px
rgba(0,0,0,.08);
}

.section-title{
font-size:38px;
font-weight:900;
margin-bottom:20px;
}

.health-btn{
width:100%;
border:none;
border-radius:22px;
padding:26px;
margin-bottom:18px;
font-size:34px;
font-weight:900;
}

.good-btn{
background:#5cc96b;
color:#fff;
}

.medicine-btn{
width:100%;
border:none;
border-radius:18px;
padding:22px;
margin-bottom:10px;
background:#f3f5f7;
font-size:30px;
font-weight:900;
}

.medicine-result{
font-size:24px;
font-weight:900;
color:#22aa44;
margin-bottom:18px;
line-height:1.7;
}

</style>
</head>

<body>

<div class="wrap">

<div class="box">

<div class="section-title">
😊 今日の状態
</div>

<button
class="health-btn good-btn"
onclick="showGood()"
>
😊 元気です
</button>

</div>



<div class="box">

<div class="section-title">
💊 今日の薬
</div>

<button
class="medicine-btn"
onclick="takeMorningMedicine()"
>
💊 朝の薬
</button>

<div
id="morningResult"
class="medicine-result"
></div>



<button
class="medicine-btn"
onclick="takeLunchMedicine()"
>
💊 昼の薬
</button>

<div
id="lunchResult"
class="medicine-result"
></div>



<button
class="medicine-btn"
onclick="takeNightMedicine()"
>
💊 夜の薬
</button>

<div
id="nightResult"
class="medicine-result"
></div>

</div>

</div>

<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbyVLKBp9HiMTvBT9GAPtpYKg6ppmUOKkpRQQbIFOudhXk9X_pU8ecRKUurtUcKKWD04/exec';

const USER_CODE =
'YAMA1234';

const USER_NAME =
'山口さん';



function getNowTime(){

return new Date()
.toLocaleTimeString(
'ja-JP',
{
hour:'2-digit',
minute:'2-digit'
}
);

}



/* GAS送信 */

function sendToGas(data){

fetch(

GAS_URL,

{

method:'POST',

mode:'no-cors',

headers:{
'Content-Type':
'text/plain'
},

body:
JSON.stringify(data)

}

);

}



/* 元気 */

function showGood(){

const time =
getNowTime();



sendToGas({

code:USER_CODE,
name:USER_NAME,

type:'元気',

status:'元気です',

time:time

});



alert(
'😊 元気を送信しました'
);

}



/* 朝 */

function takeMorningMedicine(){

const time =
getNowTime();



document.getElementById(
'morningResult'
).innerHTML =

'✅ 飲みました ' +
time;



sendToGas({

code:USER_CODE,
name:USER_NAME,

type:'薬',

status:'朝の薬',

time:time

});

}



/* 昼 */

function takeLunchMedicine(){

const time =
getNowTime();



document.getElementById(
'lunchResult'
).innerHTML =

'✅ 飲みました ' +
time;



sendToGas({

code:USER_CODE,
name:USER_NAME,

type:'薬',

status:'昼の薬',

time:time

});

}



/* 夜 */

function takeNightMedicine(){

const time =
getNowTime();



document.getElementById(
'nightResult'
).innerHTML =

'✅ 飲みました ' +
time;



sendToGas({

code:USER_CODE,
name:USER_NAME,

type:'薬',

status:'夜の薬',

time:time

});

}

</script>

</body>
</html>
