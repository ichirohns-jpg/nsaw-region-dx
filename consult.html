<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AI相談DX</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:0;
background:#f1f4f7;
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
color:#222;
}

.wrap{
max-width:720px;
margin:0 auto;
padding:22px 16px 120px;
}

.header{
font-size:38px;
font-weight:900;
margin-bottom:20px;
line-height:1.4;
}

.card{
background:#fff;
border-radius:28px;
padding:26px;
margin-bottom:22px;

box-shadow:
0 8px 24px rgba(0,0,0,.08);
}

.title{
font-size:34px;
font-weight:900;
margin-bottom:18px;
line-height:1.5;
}

.desc{
font-size:24px;
line-height:1.8;
font-weight:700;
color:#444;
margin-bottom:24px;
}

textarea{
width:100%;
height:180px;
border:none;
border-radius:22px;
padding:22px;
font-size:26px;
background:#f7f9fb;
resize:none;
outline:none;
line-height:1.7;
margin-bottom:22px;
}

.btn{
width:100%;
border:none;
border-radius:22px;
padding:28px;
font-size:32px;
font-weight:900;
background:#58c86b;
color:#fff;
}

.result{
margin-top:24px;
font-size:24px;
font-weight:900;
line-height:1.8;
color:#1f9d4a;
white-space:pre-wrap;
}

.bottom-menu{
position:fixed;
left:0;
right:0;
bottom:0;

background:#fff;

display:flex;
justify-content:space-around;

padding:14px 0;

box-shadow:
0 -4px 14px rgba(0,0,0,.10);

z-index:999;
}

.bottom-btn{
text-decoration:none;
color:#222;
font-size:16px;
font-weight:900;
text-align:center;
width:25%;
}

.bottom-icon{
display:block;
font-size:28px;
margin-bottom:4px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="header">
🤖 AI相談DX
</div>



<div class="card">

<div class="title">
困っていることを書いてください
</div>

<div class="desc">
介護・暮らし・病院・お金・家族・空き家など、
困っていることを簡単に入力してください。
</div>

<textarea
id="consultText"
placeholder="例：
薬を飲み忘れることが増えた
病院へ行くのが不安
家族に迷惑をかけたくない"
></textarea>

<button
class="btn"
onclick="startConsult()"
>
🤖 AI相談を開始
</button>

<div
id="result"
class="result"
></div>

</div>

</div>



<div class="bottom-menu">

<a class="bottom-btn" href="./">
<span class="bottom-icon">🏠</span>
ホーム
</a>

<a class="bottom-btn" href="./family.html">
<span class="bottom-icon">👪</span>
家族
</a>

<a class="bottom-btn" href="./map.html">
<span class="bottom-icon">🗺</span>
地図
</a>

<a class="bottom-btn" href="./consult.html">
<span class="bottom-icon">🤖</span>
相談
</a>

</div>



<script>

function startConsult(){

const text =
document.getElementById(
'consultText'
).value;



if(!text){

alert('困りごとを入力してください');

return;

}



document.getElementById(
'result'
).innerHTML =

'AI相談準備中です。\n\n' +

'入力内容：\n' +

text +

'\n\n' +

'次の段階でAIコンシェルジュへ接続します。';

}

</script>

</body>
</html>
