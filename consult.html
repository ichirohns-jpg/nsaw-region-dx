<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI相談DX</title>

<script src="./config.js"></script>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#f1f4f7;
font-family:
-apple-system,
BlinkMacSystemFont,
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#222;
}

.wrap{
max-width:720px;
margin:0 auto;
padding:22px 16px 120px;
}

.header{
font-size:38px;
font-weight:900;
margin-bottom:20px;
line-height:1.4;
}

.card{
background:#fff;
border-radius:28px;
padding:26px;
box-shadow:
0 8px 24px rgba(0,0,0,.08);
}

.title{
font-size:34px;
font-weight:900;
margin-bottom:18px;
}

.desc{
font-size:24px;
line-height:1.8;
font-weight:700;
color:#444;
margin-bottom:24px;
}

textarea{
width:100%;
height:190px;
border:none;
border-radius:22px;
padding:22px;
font-size:26px;
background:#f7f9fb;
resize:none;
outline:none;
line-height:1.7;
margin-bottom:22px;
}

.btn{
width:100%;
border:none;
border-radius:22px;
padding:28px;
font-size:32px;
font-weight:900;
color:#fff;
margin-bottom:16px;
}

.voice-btn{
background:#4da3ff;
}

.send-btn{
background:#58c86b;
}

.result{
margin-top:24px;
font-size:25px;
font-weight:900;
line-height:1.8;
color:#222;
white-space:pre-wrap;
background:#f7f9fb;
border-radius:22px;
padding:22px;
min-height:180px;
}

.bottom-menu{
position:fixed;
left:0;
right:0;
bottom:0;
background:#fff;
display:flex;
justify-content:space-around;
padding:14px 0;
box-shadow:
0 -4px 14px rgba(0,0,0,.10);
z-index:999;
}

.bottom-btn{
text-decoration:none;
color:#222;
font-size:16px;
font-weight:900;
text-align:center;
width:25%;
}

.bottom-icon{
display:block;
font-size:28px;
margin-bottom:4px;
}

</style>

</head>

<body>

<div class="wrap">

<div class="header">
🤖 AI相談DX
</div>

<div class="card">

<div class="title">
困っていることを書いてください
</div>

<div class="desc">
病院・介護・薬・家族・空き家など、
話すだけでも大丈夫です。
</div>

<textarea
id="input"
placeholder="例：薬を飲み忘れることが増えた"
></textarea>

<button
id="voiceBtn"
class="btn voice-btn"
>
🎤 話して入力する
</button>

<button
id="sendBtn"
class="btn send-btn"
>
🤖 AIに相談する
</button>

<div
id="output"
class="result"
>
ここにAI回答が表示されます
</div>

</div>
</div>

<div class="bottom-menu">

<a class="bottom-btn" href="./">
<span class="bottom-icon">🏠</span>
ホーム
</a>

<a class="bottom-btn" href="./family.html">
<span class="bottom-icon">👪</span>
家族
</a>

<a class="bottom-btn" href="./map.html">
<span class="bottom-icon">🗺</span>
地図
</a>

<a class="bottom-btn" href="./consult.html">
<span class="bottom-icon">🤖</span>
相談
</a>

</div>

<script>

const GAS_URL =
window.APP_CONFIG.GAS_URL;



/* =====================
   音声入力
===================== */

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;



if(SpeechRecognition){

const recognition =
new SpeechRecognition();

recognition.lang = 'ja-JP';

recognition.interimResults = false;

recognition.continuous = false;



document
.getElementById("voiceBtn")
.addEventListener(
"click",
() => {

recognition.start();

document
.getElementById("output")
.innerText =
"🎤 聞き取っています...";

}
);



recognition.onresult =
(event) => {

const text =
event.results[0][0].transcript;

document
.getElementById("input")
.value = text;

document
.getElementById("output")
.innerText =
"🎤 入力しました\n\n" +
text;

};



recognition.onerror =
(event) => {

document
.getElementById("output")
.innerText =
"音声入力エラー\n\n" +
event.error;

};

}



/* =====================
   AI送信
===================== */

document
.getElementById("sendBtn")
.addEventListener(
"click",
async () => {

const msg =
document
.getElementById("input")
.value
.trim();



const output =
document
.getElementById("output");



if(!msg){

output.innerText =
"相談内容を入力してください";

return;

}



output.innerText =
"🤖 AIが整理しています...";



try{

const res =
await fetch(
GAS_URL,
{
method:"POST",
body:JSON.stringify({
message:msg
})
}
);



const text =
await res.text();



let data = {};



try{

data =
JSON.parse(text);

}catch(err){

output.innerText =
"JSON解析失敗\n\n" +
text;

return;

}



/* =====================
   AI返答
===================== */

if(data.reply){

output.innerText =
data.reply;



/* =====================
   音声読み上げ
===================== */

speechSynthesis.cancel();

const speech =
new SpeechSynthesisUtterance(
data.reply
);

speech.lang = 'ja-JP';

speech.rate = 1;

speech.pitch = 1;

speech.volume = 1;

speechSynthesis.speak(
speech
);



return;

}



/* =====================
   ERROR
===================== */

if(data.error){

output.innerText =
"エラー:\n\n" +
data.error;

return;

}



/* =====================
   DEBUG
===================== */

output.innerText =
JSON.stringify(
data,
null,
2
);



}catch(err){

output.innerText =
"通信失敗\n\n" +
err;

}

}
);

</script>

</body>
</html>
