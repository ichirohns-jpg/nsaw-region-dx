<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AI相談DX</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
padding:0;
background:#f1f4f7;
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
color:#222;
}

.wrap{
max-width:720px;
margin:0 auto;
padding:22px 16px 120px;
}

.header{
font-size:38px;
font-weight:900;
margin-bottom:20px;
line-height:1.4;
}

.card{
background:#fff;
border-radius:28px;
padding:26px;
margin-bottom:22px;
box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.title{
font-size:34px;
font-weight:900;
margin-bottom:18px;
line-height:1.5;
}

.desc{
font-size:24px;
line-height:1.8;
font-weight:700;
color:#444;
margin-bottom:24px;
}

textarea{
width:100%;
height:190px;
border:none;
border-radius:22px;
padding:22px;
font-size:26px;
background:#f7f9fb;
resize:none;
outline:none;
line-height:1.7;
margin-bottom:22px;
}

.btn{
width:100%;
border:none;
border-radius:22px;
padding:28px;
font-size:32px;
font-weight:900;
background:#58c86b;
color:#fff;
}

.result{
margin-top:24px;
font-size:25px;
font-weight:900;
line-height:1.8;
color:#222;
white-space:pre-wrap;
background:#f7f9fb;
border-radius:22px;
padding:22px;
min-height:180px;
}

.bottom-menu{
position:fixed;
left:0;
right:0;
bottom:0;
background:#fff;
display:flex;
justify-content:space-around;
padding:14px 0;
box-shadow:0 -4px 14px rgba(0,0,0,.10);
z-index:999;
}

.bottom-btn{
text-decoration:none;
color:#222;
font-size:16px;
font-weight:900;
text-align:center;
width:25%;
}

.bottom-icon{
display:block;
font-size:28px;
margin-bottom:4px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="header">
🤖 AI相談DX
</div>

<div class="card">

<div class="title">
困っていることを書いてください
</div>

<div class="desc">
病院・薬・介護・家族・空き家など、
短く書くだけで大丈夫です。
</div>

<textarea
id="consultText"
placeholder="例：
近くの病院へ通院したい
薬を飲み忘れる
家族と話せない"
></textarea>

<button
class="btn"
onclick="startConsult()"
>
🤖 AIに相談する
</button>

<div
id="result"
class="result"
>
ここにAI相談結果が表示されます
</div>

</div>

</div>



<div class="bottom-menu">

<a class="bottom-btn" href="./">
<span class="bottom-icon">🏠</span>
ホーム
</a>

<a class="bottom-btn" href="./family.html">
<span class="bottom-icon">👪</span>
家族
</a>

<a class="bottom-btn" href="./map.html">
<span class="bottom-icon">🗺</span>
地図
</a>

<a class="bottom-btn" href="./consult.html">
<span class="bottom-icon">🤖</span>
相談
</a>

</div>



<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbyFUX6w7KMKZ87PR37MrFaPgW1clmiTR5LigJO43XLVQCZ7IdsGLP6HXPeNMzd9qN1L/exec';



function startConsult(){

const text =
document.getElementById(
'consultText'
).value.trim();



if(!text){

alert('困りごとを入力してください');

return;

}



document.getElementById(
'result'
).innerHTML =

'🤖 AIが整理しています...';



window.handleAI = function(data){

document.getElementById(
'result'
).innerHTML =

'🤖 AI相談結果\n\n' +

(data.answer || 'AI回答取得失敗');

};



const script =
document.createElement('script');



script.src =

GAS_URL +

'?mode=consult' +

'&callback=handleAI' +

'&text=' +

encodeURIComponent(text);



document.body.appendChild(script);

}

</script>

</body>
</html>
