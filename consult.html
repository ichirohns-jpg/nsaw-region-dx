<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI相談DX</title>

<script src="./config.js"></script>

</head>

<body>

<h1>🤖 AI相談DX</h1>

<textarea
id="input"
placeholder="相談内容を入力"
style="
width:100%;
height:180px;
font-size:20px;
"
></textarea>

<br><br>

<button
id="sendBtn"
style="
font-size:24px;
padding:12px 24px;
"
>
送信
</button>

<br><br>

<div
id="output"
style="
white-space:pre-wrap;
font-size:22px;
"
>
ここにAI回答が表示されます
</div>

<script>

const GAS_URL =
window.APP_CONFIG.GAS_URL;



document
.getElementById("sendBtn")
.addEventListener(
"click",
async () => {

const msg =
document
.getElementById("input")
.value
.trim();



const output =
document
.getElementById("output");



if(!msg){

output.innerText =
"相談内容を入力してください";

return;

}



output.innerText =
"通信中...";



try{

const res =
await fetch(
GAS_URL,
{
method:"POST",
body:JSON.stringify({
message:msg
})
}
);



const text =
await res.text();



let data = {};



try{

data =
JSON.parse(text);

}catch(err){

output.innerText =
"JSON解析失敗\n\n" +
text;

return;

}



/* =====================
   AI返答
===================== */

if(data.reply){

output.innerText =
data.reply;

return;

}



/* =====================
   ERROR
===================== */

if(data.error){

output.innerText =
"エラー:\n\n" +
data.error;

return;

}



/* =====================
   DEBUG
===================== */

output.innerText =
JSON.stringify(
data,
null,
2
);



}catch(err){

output.innerText =
"通信失敗\n\n" +
err;

}

}
);

</script>

</body>
</html>
