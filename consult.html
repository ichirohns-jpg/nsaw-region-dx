<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI相談DX 最小構成</title>
</head>

<body>

<textarea id="input" placeholder="相談内容を入力"></textarea>

<button id="sendBtn">送信</button>

<div id="output"></div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxZ5dCMbH4rA9ncx0qRFroyW1O5YyjgBzjES4gM2yVSaQMFC4LlUz0XNna0YBBdlFuk/exec";

document
.getElementById('sendBtn')
.addEventListener('click', async () => {

const msg =
document.getElementById('input').value;

const output =
document.getElementById('output');

if(!msg) return;

output.innerText = "通信中...";

try {

const res = await fetch(GAS_URL, {

method: 'POST',

body: JSON.stringify({
message: msg
})

});

if (!res.ok)
throw new Error(
`HTTPエラー: ${res.status}`
);

const data =
await res.json();

if (data.success) {

output.innerText =
data.reply;

} else {

output.innerText =
`エラー: ${data.error}`;

}

} catch (err) {

output.innerText =
`通信失敗: ${err.message}`;

}

});

</script>

</body>
</html>
